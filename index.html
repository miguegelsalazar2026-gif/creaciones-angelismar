<!DOCTYPE html>
<html>
<body style="background:#000; color:#fff; padding:20px;">
    <h2>Mi Galería de Archivos</h2>
    <div id="galeria">
        <!-- Aquí aparecerán tus fotos -->
    </div>

    <script>
        const archivos = ["1762909234357.jpg", "1781969792756.jpg", "1781969804389.jpg", "1781969999309.jpg", "1782737045531.png", "1782737094781.png", "1782738198213.png", "1783359760434.jpg"];
        
        let html = "";
        archivos.forEach(archivo => {
            html += `<div style="margin-bottom:30px; border:1px solid #d4af37; padding:10px;">
                        <img src="${archivo}" style="width:100%;">
                        <p style="word-break: break-all;">Nombre: <b>${archivo}</b></p>
                    </div>`;
        });
        document.getElementById('galeria').innerHTML = html;
    </script>
</body>
</html>
